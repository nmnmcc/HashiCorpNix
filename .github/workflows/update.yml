name: Update HashiCorp versions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update versions
        run: bash update.sh

      - name: Commit and push
        run: |
          git diff --quiet versions.json 2>/dev/null && { echo "No changes"; exit 0; }
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: update versions $(date -u +%F)"
          git push
